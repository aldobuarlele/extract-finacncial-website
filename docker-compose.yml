services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: expense_intel_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api_backend:
    build: ./backend
    container_name: expense-intelligence-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres_db
      - redis_cache

  celery_worker:
    build: ./backend
    container_name: expense-intelligence-worker
    command: python -m celery -A app.worker.celery_app worker --loglevel=info -Q expense_tasks
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres_db
      - redis_cache
      - api_backend

  web_frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api_backend

volumes:
  pg_data: