version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: expense_intel_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api_backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://admin:securepassword123@postgres_db:5432/expense_intel_db
      - REDIS_URL=redis://redis_cache:6379/0
      - GEMINI_API_KEY=AIzaSyDsBO89Uu_iEuPQCNynFqy1Rrz5NqnI-vQ
    depends_on:
      - postgres_db
      - redis_cache

  web_frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api_backend

volumes:
  pg_data: